<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASAT 2026 - SDN NGASEM I - BAHASA INGGRIS</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --accent: #f59e0b;
            --bg: #f1f5f9; --text-main: #1e293b; --white: #ffffff;
            --danger: #ef4444; --success: #10b981; --border: #e2e8f0;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; user-select: none; color: var(--text-main); overflow-x: hidden; }

        /* Login Page */
        #login-page {
            position: fixed; inset: 0; background: linear-gradient(135deg, #4f46e5, #312e81); 
            display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 15px;
        }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); text-align: center; }
        .logo-tutwuri { width: 70px; height: auto; margin-bottom: 15px; }

        /* Header */
        header { 
            background: var(--white); border-bottom: 2px solid var(--border); padding: 0 20px; 
            display: none; justify-content: space-between; align-items: center; height: 70px;
            position: sticky; top: 0; z-index: 100;
        }
        .timer-box { background: #fff1f2; padding: 8px 15px; border-radius: 10px; border: 1px solid #ffe4e6; font-weight: 800; font-size: 1.1rem; color: var(--danger); font-family: monospace; }

        /* Main Layout */
        .main-wrapper { 
            display: none; 
            padding: 20px; 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            flex-direction: row; /* Desktop sampingan */
        }

        .soal-section { 
            flex: 2; 
            background: white; 
            border-radius: 15px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        }

        .sidebar { 
            flex: 1; 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            max-width: 320px; 
            border: 1px solid var(--border); 
            height: fit-content; 
            position: sticky; 
            top: 90px; 
        }

        /* Responsive HP */
        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; padding: 10px; }
            .sidebar { max-width: 100%; position: static; order: 2; } /* Sidebar pindah ke bawah soal */
            .soal-section { order: 1; }
            header { height: 60px; padding: 0 15px; }
            #user-display { font-size: 0.9rem; }
            .timer-box { font-size: 1rem; }
        }

        /* Soal Content */
        .soal-content { padding: 25px; font-size: 1.1rem; line-height: 1.6; }
        .q-image { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); display: block; margin-left: auto; margin-right: auto; }

        .opt-item { border: 1px solid var(--border); padding: 12px 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .opt-item:hover { background: #f8fafc; }
        .opt-item.selected { background: #eff6ff; border: 2px solid var(--primary); font-weight: 600; }
        .opt-label { min-width: 30px; height: 30px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .selected .opt-label { background: var(--primary); color: white; border-color: var(--primary); }

        /* Grid Nomor Navigasi */
        .grid-nomor { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            margin-top: 15px; 
        }
        
        @media (max-width: 480px) {
            .grid-nomor { grid-template-columns: repeat(6, 1fr); } /* Lebih ramping di HP */
        }

        .btn-nomor { aspect-ratio: 1/1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.8rem; background: white; }
        .btn-nomor.active { border: 2px solid var(--primary); color: var(--primary); background: #eff6ff; }
        .btn-nomor.filled { background: var(--primary); color: white; border-color: var(--primary); }

        input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 1rem; margin-top: 10px; outline: none; }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); }

        #result-page { display: none; max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loading" class="loading-overlay">

</div>

<header id="exam-header">
    <div>

<div class="main-wrapper" id="exam-body">

        </div>
        <div style="padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #f8fafc;">
            <button id="btn-prev" onclick="nav(-1)" style="padding: 12px 18px; border: 1px solid var(--border); border-radius: 10px; background: white; font-weight: 700; cursor: pointer;">KEMBALI</button>
            <button id="btn-next" onclick="nav(1)" style="flex-grow: 1; padding: 12px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: 700; cursor: pointer;">BERIKUTNYA</button>

    <div class="sidebar">

</div>

    let current = 0;
    let answers = {};

    async function startExam() {
        const name = document.getElementById('stu-name').value.trim();
        const id = document.getElementById('stu-id').value.trim();
        
        if(!name || !id) { alert("Nama dan Nomor harus diisi!"); return; }

        document.getElementById('loading').style.display = 'flex';
        document.getElementById('loading-text').innerText = "Memvalidasi data...";

        try {
            const response = await fetch(`${SCRIPT_URL}?action=checkStatus&no_peserta=${id}`);
            const status = await response.text();

            if (status === "exists") {
                alert("Nomor Peserta ini sudah digunakan!");
                document.getElementById('loading').style.display = 'none';
                return;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('user-display').innerText = name;
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('exam-header').style.display = 'flex';
            document.getElementById('exam-body').style.display = 'flex';
            
            const saved = localStorage.getItem('asat_answers_inggris');
            if(saved) answers = JSON.parse(saved);

            initNav();
            render();
            startTimer(90);
        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            alert("Koneksi gagal. Coba lagi.");
        }
    }

    function initNav() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        bankSoal.forEach((_, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-nomor';
            btn.id = 'bn-' + i;
            btn.innerText = i + 1;
            btn.onclick = () => { current = i; render(); };
            grid.appendChild(btn);
        });
    }

    function render() {
        const s = bankSoal[current];
        document.getElementById('header-no').innerText = "SOAL NO " + (current + 1);
        document.getElementById('q-type').innerText = s.type.toUpperCase();
        document.getElementById('q-text').innerHTML = s.q;
        
        const imgContainer = document.getElementById('img-container');
        imgContainer.innerHTML = s.img ? `<img src="${s.img}" class="q-image">` : "";

        const area = document.getElementById('ans-area');
        area.innerHTML = "";

        if(s.type === 'pg') {
            s.o.forEach((opt, i) => {
                const char = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                const isSelected = answers[current] === char;
                div.className = 'opt-item' + (isSelected ? ' selected' : '');
                div.innerHTML = `<div class="opt-label">${char}</div><div>${opt}</div>`;
                div.onclick = () => { saveAnswer(char); };
                area.appendChild(div);
            });
        } else if(s.type === 'isian') {
            area.innerHTML = `<input type="text" id="ans-input" value="${answers[current]||''}" oninput="saveAnswer(this.value)" placeholder="Ketik jawaban singkat...">`;
        } else {
            area.innerHTML = `<textarea oninput="saveAnswer(this.value)" placeholder="Tuliskan jawaban lengkap...">${answers[current]||''}</textarea>`;
        }
        window.scrollTo(0,0);
        updateUI();
    }

    function saveAnswer(val) {
        answers[current] = val;
        localStorage.setItem('asat_answers_inggris', JSON.stringify(answers));
        if(bankSoal[current].type === 'pg') render();
        updateUI();
    }

    function updateUI() {
        let count = 0;
        bankSoal.forEach((_, i) => {
            const btn = document.getElementById('bn-' + i);
            if(answers[i] && answers[i] !== "") { 
                btn.classList.add('filled'); 
                count++; 
            } else {
                btn.classList.remove('filled');
            }
            if(current === i) btn.classList.add('active'); else btn.classList.remove('active');
        });
        document.getElementById('progress').innerText = count + "/50";
        document.getElementById('btn-prev').disabled = current === 0;
        document.getElementById('btn-next').innerText = current === 49 ? "SELESAI" : "BERIKUTNYA";
    }

    function nav(d) {
        if(current + d >= 0 && current + d < 50) { current += d; render(); }
        else if (current + d === 50) confirmFinish();
    }

    function confirmFinish() {
        const count = Object.values(answers).filter(a => a !== "").length;
        const msg = count < 50 ? `Ada ${50 - count} soal belum dijawab. Kirim sekarang?` : "Yakin ingin mengirim jawaban?";
        if(confirm(msg)) submitData();
    }

    function submitData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('loading-text').innerText = "Mengirim jawaban...";
        
        let pgBenar = 0;
        bankSoal.forEach((s, i) => {
            if(s.type === 'pg' && answers[i] === s.a) pgBenar++;
        });

        const payload = {
            nama: document.getElementById('stu-name').value,
            nomor_peserta: document.getElementById('stu-id').value,
            skor_pg: pgBenar,
            jawaban_lengkap: JSON.stringify(answers)
        };

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload),
            headers: { "Content-Type": "text/plain" }
        }).then(() => {
            localStorage.removeItem('asat_answers_inggris');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('exam-body').style.display = 'none';
            document.getElementById('exam-header').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';
        }).catch(() => {
            alert("Gagal kirim. Cek internet!");
            document.getElementById('loading').style.display = 'none';
        });
    }

    function startTimer(m) {
        let t = m * 60;
        const iv = setInterval(() => {
            let mn = Math.floor(t/60); let s = t%60;
            document.getElementById('timer').innerText = `${mn}:${s<10?'0':''}${s}`;
            if(t-- <= 0) { 
                clearInterval(iv); 
                submitData(); 
            }
        }, 1000);
    }

    function clearAndReload() {
        localStorage.removeItem('asat_answers_inggris');
        location.reload();
    }

    // Proteksi sederhana
    window.onbeforeunload = () => "Ujian sedang berlangsung!";
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && ['c','v','u'].includes(e.key)) {
            e.preventDefault();
            alert("Aksi dilarang!");
        }
    });
</script>
</body>
</html>
