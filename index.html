<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASAT 2026 - SDN NGASEM I - SENI RUPA</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --accent: #f59e0b;
            --bg: #f1f5f9; --text-main: #1e293b; --white: #ffffff;
            --danger: #ef4444; --success: #10b981; --border: #e2e8f0;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; user-select: none; color: var(--text-main); overflow-x: hidden; }

        /* Login Page */
        #login-page {
            position: fixed; inset: 0; background: linear-gradient(135deg, #4f46e5, #312e81); 
            display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); text-align: center; }
        .logo-tutwuri { width: 80px; height: auto; margin-bottom: 20px; }

        /* Header */
        header { 
            background: var(--white); border-bottom: 2px solid var(--border); padding: 0 25px; 
            display: none; justify-content: space-between; align-items: center; height: 75px;
            position: sticky; top: 0; z-index: 100;
        }
        .timer-box { background: #fff1f2; padding: 10px 20px; border-radius: 10px; border: 1px solid #ffe4e6; font-weight: 800; font-size: 1.3rem; color: var(--danger); font-family: monospace; }

        /* Layout */
        .main-wrapper { display: none; min-height: calc(100vh - 75px); padding: 25px; gap: 25px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
        .soal-section { flex: 3; min-width: 300px; background: white; border-radius: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .soal-content { flex: 1; padding: 30px; font-size: 1.15rem; line-height: 1.7; overflow-y: auto; }
        
        .q-image { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); display: block; margin: 0 auto; }

        .opt-item { border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .opt-item:hover { background: #f8fafc; border-color: var(--primary); }
        .opt-item.selected { background: #eff6ff; border: 2px solid var(--primary); font-weight: 600; }
        .opt-label { min-width: 32px; height: 32px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; }
        .selected .opt-label { background: var(--primary); color: white; border-color: var(--primary); }

        input[type="text"], textarea { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; margin-top: 10px; outline: none; }
        textarea { height: 150px; resize: none; }

        .sidebar { flex: 1; min-width: 280px; background: white; border-radius: 15px; padding: 20px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 100px; }
        .grid-nomor { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .btn-nomor { aspect-ratio: 1/1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.85rem; background: white; }
        .btn-nomor.active { border: 2px solid var(--primary); color: var(--primary); }
        .btn-nomor.filled { background: var(--primary); color: white; border-color: var(--primary); }

        #result-page { display: none; max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loading" class="loading-overlay">
    <div style="border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 15px; font-weight: bold;">Mengecek Status Peserta...</p>
</div>

<div id="login-page">
    <div class="login-card">
        <img src="https://awsimages.detik.net.id/community/media/visual/2023/05/02/lambang-tut-wuri-handayani.png?w=700&q=90" class="logo-tutwuri" alt="Logo">
        <h1 style="color: var(--primary); margin: 0; font-size: 1.5rem;">ASAT SENI RUPA</h1>
        <p style="margin-top: 5px; font-weight: 600; color: #64748b;">SD NEGERI NGASEM I - 2026</p>
        
        <div style="text-align: left; margin-top: 25px;">
            <label style="font-weight: bold; font-size: 0.85rem;">NAMA LENGKAP</label>
            <input type="text" id="stu-name" placeholder="Masukkan nama..." autocomplete="off">
            <label style="font-weight: bold; font-size: 0.85rem; display:block; margin-top:15px">NOMOR PESERTA</label>
            <input type="text" id="stu-id" placeholder="Contoh: 2026-001" autocomplete="off">
        </div>
        
        <button onclick="startExam()" style="width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; margin-top:20px; font-size: 1rem;">MULAI UJIAN</button>
    </div>
</div>

<header id="exam-header">
    <div>
        <small style="color: #64748b; font-weight: bold;">PESERTA</small>
        <div id="user-display" style="font-weight: 800; color: var(--primary); text-transform: uppercase;">-</div>
    </div>
    <div class="timer-box" id="timer">90:00</div>
</header>

<div class="main-wrapper" id="exam-body">
    <div class="soal-section">
        <div style="padding: 15px 25px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 700;">
            <span id="header-no">SOAL NO 1</span>
            <span id="q-type" style="background: #e0f2fe; color: var(--primary); font-size: 0.7rem; padding: 4px 10px; border-radius: 6px;">PG</span>
        </div>
        <div class="soal-content">
            <div id="img-container"></div>
            <div id="q-text" style="font-weight:600; margin-bottom:20px"></div>
            <div id="ans-area"></div>
        </div>
        <div style="padding: 20px 25px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #f8fafc;">
            <button id="btn-prev" onclick="nav(-1)" style="padding: 12px 20px; border: 1px solid var(--border); border-radius: 8px; background: white; font-weight: 700; cursor: pointer;">KEMBALI</button>
            <button id="btn-next" onclick="nav(1)" style="flex-grow: 1; padding: 12px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 700; cursor: pointer;">BERIKUTNYA</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight: 800; font-size: 0.9rem; margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span>NAVIGASI</span> 
            <span id="progress" style="color: var(--primary);">0/50</span>
        </div>
        <div class="grid-nomor" id="nav-grid"></div>
        <button onclick="confirmFinish()" style="width: 100%; margin-top: 25px; padding: 15px; border-radius: 10px; border: none; background: var(--danger); color: white; font-weight: 700; cursor: pointer;">SELESAI & KIRIM</button>
    </div>
</div>

<div id="result-page">
    <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
    <h2 style="color: var(--primary); margin: 0;">BERHASIL TERKIRIM</h2>
    <p style="color: #64748b;">Jawaban Anda telah tersimpan di server.</p>
    <button onclick="clearAndReload()" style="width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold; margin-top: 20px;">KELUAR</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTRx2b7eTgyQb9QRgIMprKagoA9jcxh6lA00rozoQewM6fOSnHZ8KbfYxMdYBzDzs/exec"; 

    const bankSoal = [
        // ... (Data soal tetap sama seperti sebelumnya)
        { id: 1, type: 'pg', q: "Keseimbangan yang sama kedua sisinya disebut…", o: ["Simetris", "Asimetris", "Singkron", "Asinkron"], a: "A" },
        { id: 2, type: 'pg', q: "Penggambaran objek benda yang memberikan kesan tidak berat sebelah disalah satu sisi dan ringan disisi yang lain disebut…", o: ["Irama", "Keseimbangan", "Kesatuan", "Proporsi"], a: "B" },
        { id: 3, type: 'pg', img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/cdd06090-710e-4e10-a551-773797b849d9-v2?w=200&h=200", q: "Amati gambar keseimbangan! Prinsip keseimbangan pada seni rupa yang sesuai dengan gambar tersebut adalah…", o: ["Irama", "Asimetris", "Tekstur", "Simetris"], a: "D" },
        { id: 4, type: 'pg', q: "Ragam hias dari nusantara banyak jenisnya. Benda berikut yang identik dengan ragam hias adalah…", o: ["Batik", "Senjata tradisional", "Rumah adat", "Tarian daerah"], a: "A" },
        { id: 5, type: 'pg', q: "Dalam pembuatan ragam hias dengan keseimbangan bebas maka diperlukan alat seperti…", o: ["Kain", "Koran", "Kuas", "Kertas"], a: "C" },
        { id: 6, type: 'pg', q: "Cara menggambar gelap terang objek gambar yang menggunakan pensil / pena gambar dengan di titik-titikan disebut Teknik…", o: ["Dusel", "Pointelis", "Akuarel", "Blok"], a: "B" },
        { id: 7, type: 'pg', q: "Berikut karya seni yang bisa diberi ragam hias flora adalah…", o: ["Lukisan", "Keramik", "Batik", "Poster"], a: "C" },
        { id: 8, type: 'pg', q: "Cabang seni yang dapat dinikmati dengan indra peraba dan indra penglihatan adalah…", o: ["Seni Musik", "Seni Rupa", "Seni Teater", "Seni Tari"], a: "B" },
        { id: 9, type: 'pg', q: "Proses pengontrolan bentuk ragam hias ukiran disebut…", o: ["Menggambar pola", "Menghaluskan bentuk", "Merancap", "Finishing"], a: "B" },
        { id: 10, type: 'pg', img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/08de5317-26b1-46e9-ac89-19873ecc27c5-v2?w=200&h=200", q: "Ukiran motif hias di atas berasal dari ....", o: ["Bali", "Jepara", "Cirebon", "Mataram"], a: "B" },
        { id: 11, type: 'pg', img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/0a7ed06c-0bba-4a03-a430-f7a680d1153c-v2?w=200&h=200", q: "Ukiran motif hias di atas berasal dari ....", o: ["Jepara", "Batak", "Cirebon", "Mataram"], a: "B" },
        { id: 12, type: 'pg', q: "Tujuan utama dari seni adalah membuat segala sesuatu menjadi lebih…", o: ["Berkesan", "Indah", "Unik", "Rumit"], a: "B" },
        { id: 13, type: 'pg', q: "Pada umumnya motif ragam hias yang ada di Nusantara mengambil bentuk dari…", o: ["Bunga", "Keris", "Garis", "Lingkaran"], a: "A" },
        { id: 14, type: 'pg', q: "Makna ragam hias ular naga dari Jawa Timur adalah…", o: ["Penolak Balak", "Kekuatan", "Pencari kebenaran", "Rejeki lancar"], a: "A" },
        { id: 15, type: 'pg', q: "Ukiran termasuk dalam karya seni… dimensi", o: ["Satu", "Dua", "Tiga", "Empat"], a: "C" },
        { id: 16, type: 'pg', q: "Desain hias dibuat sedemikian rupa sehingga lebih kuat merupakan prinsip…", o: ["Kesatuan", "Tepat guna", "Tepat Bahan", "Konstruksi"], a: "D" },
        { id: 17, type: 'pg', q: "Ragam hias motif fauna Komodo berasal dari…", o: ["Nusa Tenggara Timur", "Makasar", "Bandung", "Semarang"], a: "A" },
        { id: 18, type: 'pg', q: "Ragam hias yang dikembangkan di Papua adalah motif…", o: ["Burung Cendrawasih", "Ular Naga", "Tengul", "Komodo"], a: "A" },
        { id: 19, type: 'pg', q: "Teknik mistar merupakan Teknik menggambar ragam hias dengan menggunakan bantuan…", o: ["Pensil", "Busur", "Penggaris", "Jangka"], a: "C" },
        { id: 20, type: 'pg', q: "Tempat untuk memamerkan hasil dari berbagai ragam hias nusantara adalah…", o: ["Teater", "Galeri", "Auditarium", "Stadion"], a: "B" },
        { id: 21, type: 'pg', q: "Seni hias kebudayaan Islam adalah seni…", o: ["Rupa", "Tajwid", "Kaligrafi", "Bebas"], a: "C" },
        { id: 22, type: 'pg', q: "Stilasi ragam hias merupakan karya seni… dimensi", o: ["Satu", "Dua", "Tiga", "Empat"], a: "B" },
        { id: 23, type: 'pg', q: "Contoh karya seni yang bisa dilihat dari berbagai arah disebut…", o: ["Patung", "Lukisan", "Foto", "Gambar"], a: "A" },
        { id: 24, type: 'pg', q: "Penciptaan karya seni dengan menciptakan sesuatu yang belum pernah ada dan mempunyai arti disebut…", o: ["Kreativitas", "Ide", "Sketsa", "Miniatur"], a: "A" },
        { id: 25, type: 'pg', q: "Gambaran awal bentuk kerajinan dari limbah rumah tangga yang akan dibuat disebut…", o: ["Desain", "Denah", "Sketsa", "Miniatur"], a: "C" },
        { id: 26, type: 'pg', q: "Berikut yang merupakan contoh limbah padat adalah…", o: ["Sisa makanan", "Air limbah", "Air sabun", "Kertas"], a: "D" },
        { id: 27, type: 'pg', q: "Berikut limbah bahan lunak yang digunakan untuk lukisan adalah…", o: ["Sedotan", "Kardus", "Botol plastik", "Pelepah pisang"], a: "D" },
        { id: 28, type: 'pg', q: "Kaca, kaleng dan plastik termasuk limbah…", o: ["Alami", "Natural", "Organik", "Anorganik"], a: "D" },
        { id: 29, type: 'pg', q: "Syarat dari kerajinan berbahan lunak dan mampu memberikan kenyamanan adalah…", o: ["Utility", "Comfortable", "Rapidity", "Safety"], a: "B" },
        { id: 30, type: 'pg', q: "Daur ulang adalah kegiatan untuk menjadikan sesuatu bahan bekas menjadi…", o: ["Bahan baku", "Bahan lama", "Bahan ubah", "Bahan baru"], a: "D" },
        { id: 31, type: 'pg', q: "Tekstur kertas koran adalah…", o: ["Halus", "Sedikit kasar", "Basah", "Kering"], a: "B" },
        { id: 32, type: 'pg', q: "Bahan dasar untuk membuat boneka aksi adalah…", o: ["Kayu", "Aluminium", "Besi", "Baja"], a: "B" },
        { id: 33, type: 'pg', q: "Manfaat membuat kerajinan dari daur kertas adalah membuat bumi menjadi…", o: ["Aman", "Lestari", "Damai", "Hidup"], a: "B" },
        { id: 34, type: 'pg', q: "Bahan dasar untuk membuat kertas koran adalah…", o: ["Karet", "Tebu", "Bambu", "Jerami"], a: "C" },
        { id: 35, type: 'pg', q: "Negara yang mengawali sejarah produksi kertas adalah…", o: ["Turki", "Mesir", "Perancis", "Tiongkok"], a: "D" },

        { id: 36, type: 'isian', q: "Objek dua dimensi memiliki ukuran ... dan ...", a: "panjang dan lebar" },
        { id: 37, type: 'isian', q: "Menggambar merupakan bagian dari karya seni ....", a: "rupa" },
        { id: 38, type: 'isian', q: "Jepara terkenal dengan pusat kerajinan ....", a: "ukiran kayu" },
        { id: 39, type: 'isian', q: "Motif hias Cirebon sering diaplikasikan pada kain ....", a: "batik" },
        { id: 40, type: 'isian', q: "Motif burung cendrawasih berasal dari ....", a: "papua" },
        { id: 41, type: 'isian', q: "Motif pola yang penataannya ragam hias diletakkan pada bagian tepi dari benda yang dihias disebut ....", a: "motif tepi" },
        { id: 42, type: 'isian', q: "Teknik manual dalam stilasi membutuhkan keterampilan ....", a: "tangan" },
        { id: 43, type: 'isian', q: "Media yang digunakan dalam membuat ragam hias adalah ....", a: "kertas" },
        { id: 44, type: 'isian', q: "Sampah plastik, kaleng termasuk jenis limbah ....", a: "anorganik" },
        { id: 45, type: 'isian', q: "Kertas yang tidak terpakai akan mencemari ....", a: "lingkungan" },

        { id: 46, type: 'uraian', q: "Jelaskan apa yang dimaksud dengan keseimbangan!", a: "" },
        { id: 47, type: 'uraian', q: "Sebutkan 3 jenis motif batik jonegoroan!", a: "" },
        { id: 48, type: 'uraian', q: "Sebutkan 3 jenis bentuk ragam hias!", a: "" },
        { id: 49, type: 'uraian', q: "Sebutkan 3 teknik menggambar ragam hias!", a: "" },
        { id: 50, type: 'uraian', q: "Sebutkan 3 manfaat mendaur ulang limbah!", a: "" }
    ];

    let current = 0;
    let answers = {};

    // PENGAMAN: Mencegah Refresh Sengaja
    window.onbeforeunload = function() {
        return "Data Anda sedang diproses, jangan tutup halaman!";
    };

    async function startExam() {
        const name = document.getElementById('stu-name').value.trim();
        const id = document.getElementById('stu-id').value.trim();
        
        if(!name || !id) { 
            alert("Nama dan Nomor harus diisi!"); 
            return; 
        }

        document.getElementById('loading').style.display = 'flex';

        try {
            // LOGIKA PERSIS BAHASA INGGRIS: Cek apakah ID sudah ada di Google Sheet
            const response = await fetch(`${SCRIPT_URL}?action=checkStatus&no_peserta=${id}`);
            const status = await response.text();

            if (status.trim() === "exists") {
                alert("MAAF: Nomor Peserta ini sudah digunakan untuk mengirim jawaban. Anda tidak bisa login dua kali!");
                document.getElementById('loading').style.display = 'none';
                return;
            }

            // Jika tidak ada, lanjutkan ujian
            document.getElementById('loading').style.display = 'none';
            document.getElementById('user-display').innerText = name;
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('exam-header').style.display = 'flex';
            document.getElementById('exam-body').style.display = 'flex';
            
            // Ambil backup dari localStorage jika ada (jika tidak sengaja refresh)
            const saved = localStorage.getItem('senirupa_backup_' + id);
            if(saved) answers = JSON.parse(saved);

            initNav();
            render();
            startTimer(90);
            
        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            alert("GAGAL KONEKSI: Pastikan internet aktif dan coba lagi.");
        }
    }

    function initNav() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        bankSoal.forEach((_, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-nomor';
            btn.id = 'bn-' + i;
            btn.innerText = i + 1;
            btn.onclick = () => { current = i; render(); };
            grid.appendChild(btn);
        });
    }

    function render() {
        const s = bankSoal[current];
        document.getElementById('header-no').innerText = "SOAL NO " + (current + 1);
        document.getElementById('q-type').innerText = s.type.toUpperCase();
        document.getElementById('q-text').innerHTML = s.q;
        
        const imgCon = document.getElementById('img-container');
        imgCon.innerHTML = s.img ? `<img src="${s.img}" class="q-image">` : "";

        const area = document.getElementById('ans-area');
        area.innerHTML = "";

        if(s.type === 'pg') {
            s.o.forEach((opt, i) => {
                const char = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                div.className = 'opt-item' + (answers[current] === char ? ' selected' : '');
                div.innerHTML = `<div class="opt-label">${char}</div><div>${opt}</div>`;
                div.onclick = () => { 
                    answers[current] = char; 
                    saveToLocal();
                    render(); 
                    updateUI(); 
                };
                area.appendChild(div);
            });
        } else if(s.type === 'isian') {
            area.innerHTML = `<input type="text" value="${answers[current]||''}" oninput="answers[current]=this.value; saveToLocal(); updateUI()" placeholder="Ketik jawaban...">`;
        } else {
            area.innerHTML = `<textarea oninput="answers[current]=this.value; saveToLocal(); updateUI()" placeholder="Tulis jawaban lengkap...">${answers[current]||''}</textarea>`;
        }
        window.scrollTo(0,0);
        updateUI();
    }

    function saveToLocal() {
        const id = document.getElementById('stu-id').value;
        localStorage.setItem('senirupa_backup_' + id, JSON.stringify(answers));
    }

    function updateUI() {
        let count = 0;
        bankSoal.forEach((_, i) => {
            const btn = document.getElementById('bn-' + i);
            if(answers[i] && answers[i] !== "") { btn.classList.add('filled'); count++; }
            else btn.classList.remove('filled');
            if(current === i) btn.classList.add('active'); else btn.classList.remove('active');
        });
        document.getElementById('progress').innerText = count + "/50";
        document.getElementById('btn-prev').disabled = current === 0;
        document.getElementById('btn-next').innerText = current === 49 ? "KONFIRMASI SELESAI" : "BERIKUTNYA";
    }

    function nav(d) {
        if(current + d >= 0 && current + d < 50) { current += d; render(); }
        else if (current + d === 50) confirmFinish();
    }

    function confirmFinish() {
        if(confirm("Yakin ingin mengirim semua jawaban sekarang?")) submitData();
    }

    function submitData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('loading').innerHTML = '<div style="border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div><p style="margin-top: 15px; font-weight: bold;">Sedang Mengirim Jawaban...</p>';

        window.onbeforeunload = null; // Lepas pengaman refresh

        let pgBenar = 0;
        bankSoal.forEach((s, i) => { if(s.type === 'pg' && answers[i] === s.a) pgBenar++; });

        const payload = {
            nama: document.getElementById('stu-name').value,
            nomor_peserta: document.getElementById('stu-id').value,
            skor_pg: pgBenar,
            jawaban_lengkap: JSON.stringify(answers)
        };

        // Mengirim data menggunakan metode POST ke Google App Script
        fetch(SCRIPT_URL, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify(payload) 
        })
        .then(() => {
            localStorage.removeItem('senirupa_backup_' + payload.nomor_peserta);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('exam-body').style.display = 'none';
            document.getElementById('exam-header').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';
        })
        .catch(err => {
            alert("Gagal mengirim jawaban. Coba klik kirim lagi.");
            document.getElementById('loading').style.display = 'none';
        });
    }

    function startTimer(m) {
        let t = m * 60;
        const timerInterval = setInterval(() => {
            let mn = Math.floor(t/60); let s = t%60;
            document.getElementById('timer').innerText = `${mn}:${s<10?'0':''}${s}`;
            if(t-- <= 0) {
                clearInterval(timerInterval);
                submitData();
            }
        }, 1000);
    }

    function clearAndReload() { 
        location.reload(); 
    }
</script>
</body>
</html>
